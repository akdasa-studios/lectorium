name: lectorium

services:
  database:
    expose:
      - 5984
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/"]
    volumes:
      - ../_data/database:/opt/couchdb/data
    networks:
      - lectorium

  database-bootstrap:
    depends_on:
      database:
        condition: service_healthy
    environment:
      - CONNECTION_STRING=http://lectorium:lectorium@database:5984
    networks:
      - lectorium

  gateway:
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - lectorium

  vayu-database:
    image: postgres:14-alpine
    expose:
      - 5432
    volumes:
      - ../_data/vayu-database:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=lectorium
      - POSTGRES_USER=lectorium
      - POSTGRES_DB=lectorium
    networks:
      - lectorium

  signed-url-generator:
    networks:
      - lectorium
    expose:
      - 8000
    ports:
      - "8000:8000"

networks:
  lectorium:
    name: lectorium
