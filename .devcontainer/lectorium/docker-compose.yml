name: lectorium

services:
  lectorium:
    build:
      context: ../..
      dockerfile: .devcontainer/lectorium/Dockerfile
    depends_on:
      - vayu-database
    ports:
      - 5173
      - 5984
      - 8081
    volumes:
      - ../..:/akd-studios/lectorium
      - /akd-studios/lectorium/modules/services/vayu/.venv

  vayu-database:
    image: postgres:14-alpine
    ports:
      - 5432:5432
    expose:
      - 5432
    volumes:
      - ../_data/vayu-database:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=lectorium
      - POSTGRES_USER=lectorium
      - POSTGRES_DB=lectorium
